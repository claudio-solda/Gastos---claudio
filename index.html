<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a2340">
<title>Meus Gastos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap');

  :root {
    --bg: #0f1623;
    --surface: #1a2340;
    --surface2: #222d4a;
    --accent: #4f8ef7;
    --accent2: #f7c94f;
    --danger: #f75f4f;
    --success: #4ff79e;
    --text: #e8edf8;
    --muted: #7a8ab0;
    --radius: 14px;
    --font-display: 'Space Grotesk', sans-serif;
    --font-body: 'Inter', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* HEADER */
  header {
    background: var(--surface);
    padding: 20px 16px 16px;
    border-bottom: 1px solid #ffffff10;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .logo {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  .mes-nav {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  .mes-nav button {
    background: var(--surface2);
    border: none;
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .mes-nav button:hover { background: var(--accent); }
  #mes-label {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 600;
    min-width: 120px;
    text-align: center;
  }

  /* RESUMO */
  .resumo {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    padding: 16px;
  }
  .card-resumo {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 10px;
    text-align: center;
  }
  .card-resumo .valor {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .card-resumo .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .valor.receita { color: var(--success); }
  .valor.gasto { color: var(--danger); }
  .valor.saldo { color: var(--accent2); }

  /* BARRA DE PROGRESSO */
  .orcamento-bar {
    margin: 0 16px 16px;
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
  }
  .orc-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .orc-header strong { color: var(--text); font-size: 13px; }
  .bar-track {
    background: var(--surface2);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease, background 0.4s;
    background: var(--accent);
  }
  .bar-fill.alerta { background: var(--accent2); }
  .bar-fill.perigo { background: var(--danger); }

  /* ABAS */
  .tabs {
    display: flex;
    gap: 6px;
    padding: 0 16px 16px;
  }
  .tab {
    flex: 1;
    padding: 10px 0;
    border: none;
    border-radius: 10px;
    background: var(--surface);
    color: var(--muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.ativo {
    background: var(--accent);
    color: #fff;
  }

  /* SEÇÕES */
  .section { display: none; padding: 0 16px; }
  .section.ativo { display: block; }

  /* FORMULÁRIO */
  .form-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .form-card h3 {
    font-family: var(--font-display);
    font-size: 15px;
    margin-bottom: 14px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 11px;
  }
  .form-row { margin-bottom: 12px; }
  .form-row label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .form-row input, .form-row select {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 11px 13px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font-body);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-row input:focus, .form-row select:focus {
    border-color: var(--accent);
  }
  .form-row select option { background: var(--surface2); }

  .tipo-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .tipo-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--surface2);
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tipo-btn.ativo-receita { border-color: var(--success); color: var(--success); background: #4ff79e15; }
  .tipo-btn.ativo-gasto { border-color: var(--danger); color: var(--danger); background: #f75f4f15; }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 4px;
  }
  .btn-primary:active { opacity: 0.8; }

  /* LISTA DE LANÇAMENTOS */
  .lista-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    margin-bottom: 10px;
    margin-top: 4px;
  }
  .lancamento-item {
    background: var(--surface);
    border-radius: 12px;
    padding: 13px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .lanc-icone {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .lanc-info { flex: 1; min-width: 0; }
  .lanc-desc {
    font-weight: 600;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lanc-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }
  .lanc-valor {
    font-family: var(--font-display);
    font-size: 15px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .lanc-valor.receita { color: var(--success); }
  .lanc-valor.gasto { color: var(--danger); }
  .lanc-del {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
    transition: color 0.2s;
  }
  .lanc-del:hover { color: var(--danger); }

  /* BADGE PAGO / A VENCER */
  .badge-status {
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    flex-shrink: 0;
    border: 1.5px solid;
    transition: all 0.2s;
  }
  .badge-status.pago {
    background: #4ff79e20;
    border-color: #4ff79e;
    color: #4ff79e;
  }
  .badge-status.pendente {
    background: #f7c94f20;
    border-color: #f7c94f;
    color: #f7c94f;
  }

  .vazio {
    text-align: center;
    padding: 40px 0;
    color: var(--muted);
    font-size: 14px;
  }
  .vazio .emoji { font-size: 36px; margin-bottom: 10px; }

  /* CATEGORIAS (RELATÓRIO) */
  .cat-item {
    background: var(--surface);
    border-radius: 12px;
    padding: 13px 14px;
    margin-bottom: 8px;
  }
  .cat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .cat-nome {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cat-valor {
    font-family: var(--font-display);
    font-weight: 700;
    color: var(--danger);
    font-size: 14px;
  }
  .cat-pct {
    font-size: 11px;
    color: var(--muted);
  }
  .cat-bar {
    background: var(--surface2);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }
  .cat-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: var(--accent);
  }

  /* ORÇAMENTO CONFIG */
  .orc-config {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .orc-config h3 {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    font-weight: 600;
  }
  .orc-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .orc-row .form-row { flex: 1; margin-bottom: 0; }
  .orc-row .btn-primary { width: auto; padding: 11px 18px; margin-top: 0; font-size: 13px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid #ffffff10;
    display: flex;
    padding: 8px 16px 12px;
    z-index: 200;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 0;
    color: var(--muted);
    font-size: 10px;
    font-family: var(--font-body);
    font-weight: 600;
    transition: color 0.2s;
  }
  .nav-btn .icon { font-size: 20px; }
  .nav-btn.ativo { color: var(--accent); }

  /* FAB */
  .fab {
    position: fixed;
    bottom: 72px;
    right: 20px;
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 20px #4f8ef750;
    z-index: 150;
    transition: transform 0.2s;
  }
  .fab:active { transform: scale(0.92); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 13px;
    font-weight: 600;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 300;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #00000090;
    z-index: 400;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 16px 40px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    margin: 0 auto 18px;
  }
  .modal h2 {
    font-family: var(--font-display);
    font-size: 18px;
    margin-bottom: 18px;
  }

  /* SPLASH SCREEN */
  #splash {
    position: fixed;
    inset: 0;
    background: #0a0a2e;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    transition: opacity 0.8s ease;
  }
  #splash img {
    width: 100%;
    max-width: 600px;
    border-radius: 16px;
    box-shadow: 0 0 40px #4f8ef750;
  }
  #splash.hide {
    opacity: 0;
    pointer-events: none;
  }

  /* TELA DE SENHA */
  #tela-senha {
    position: fixed;
    inset: 0;
    background: #0f1623;
    z-index: 9998;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 32px;
  }
  #tela-senha.hide { display: none; }
  .senha-card {
    background: var(--surface);
    border-radius: 20px;
    padding: 32px 24px;
    width: 100%;
    max-width: 360px;
    text-align: center;
  }
  .senha-logo {
    font-family: var(--font-display);
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .senha-logo span { color: var(--accent); }
  .senha-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 24px;
  }
  .senha-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    padding: 13px;
    color: var(--text);
    font-size: 16px;
    font-family: var(--font-body);
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  .senha-input:focus { border-color: var(--accent); }
  .senha-input.erro { border-color: var(--danger); }
  .senha-erro {
    font-size: 12px;
    color: var(--danger);
    margin-bottom: 12px;
    display: none;
  }
  .senha-erro.show { display: block; }
</style>
</head>
<body>

<!-- TELA DE SENHA -->
<div id="tela-senha">
  <div class="senha-card">
    <div class="senha-logo">Meus<span>Gastos</span></div>
    <div class="senha-sub">Digite a senha para acessar</div>
    <input type="password" class="senha-input" id="senha-input" placeholder="••••••••" onkeydown="if(event.key==='Enter') verificarSenha()">
    <div class="senha-erro" id="senha-erro">Senha incorreta. Tente novamente.</div>
    <button class="btn-primary" onclick="verificarSenha()">Entrar</button>
  </div>
</div>

<script>
const SENHA_CORRETA = 'Claude249';

function verificarSenha() {
  const input = document.getElementById('senha-input');
  const erro = document.getElementById('senha-erro');
  if (input.value === SENHA_CORRETA) {
    document.getElementById('tela-senha').classList.add('hide');
  } else {
    input.classList.add('erro');
    erro.classList.add('show');
    input.value = '';
    setTimeout(() => { input.classList.remove('erro'); }, 1000);
  }
}

function checarSenha() {
  document.getElementById('tela-senha').classList.remove('hide');
}

const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const CATS_PADRAO = [
  { nome: 'Alimentação', emoji: '🛒' },
  { nome: 'Transporte', emoji: '🚌' },
  { nome: 'Saúde', emoji: '💊' },
  { nome: 'Educação', emoji: '📚' },
  { nome: 'Moradia', emoji: '🏠' },
  { nome: 'Lazer', emoji: '🎉' },
  { nome: 'Vestuário', emoji: '👕' },
  { nome: 'Outros', emoji: '📦' },
  { nome: 'Empréstimo', emoji: '💳' },
  { nome: 'Dívidas', emoji: '📋' },
];

let state = {
  contasFixas: [],
  lancamentos: [],
  categorias: [...CATS_PADRAO],
  orcamento: 0,
  mesAtual: new Date().getMonth(),
  anoAtual: new Date().getFullYear(),
  tipoForm: 'gasto',
  mesesGerados: []
};

function carregar() {
  const s = localStorage.getItem('meusgastos_v1');
  if (s) {
    try {
      const d = JSON.parse(s);
      state = { ...state, ...d };
      if (!state.mesesGerados) state.mesesGerados = [];
    } catch(e) {}
  }
}

function salvar() {
  localStorage.setItem('meusgastos_v1', JSON.stringify(state));
}

function fmt(v) {
  return 'R$ ' + Math.abs(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function lancamentosMes() {
  return state.lancamentos.filter(l => {
    const d = new Date(l.data + 'T00:00:00');
    let mesFim = state.mesAtual + 1;
    let anoFim = state.anoAtual;
    if (mesFim > 11) { mesFim = 0; anoFim++; }
    const inicio = new Date(state.anoAtual, state.mesAtual, 20);
    const fim = new Date(anoFim, mesFim, 5);
    return d >= inicio && d <= fim;
  });
}

// Busca o lançamento gerado pela conta fixa no mês atual
function getLancamentoFixaMes(fixaId) {
  return state.lancamentos.find(l => {
    if (l.fixaId !== fixaId) return false;
    const d = new Date(l.data + 'T00:00:00');
    let mesFim = state.mesAtual + 1;
    let anoFim = state.anoAtual;
    if (mesFim > 11) { mesFim = 0; anoFim++; }
    const inicio = new Date(state.anoAtual, state.mesAtual, 20);
    const fim = new Date(anoFim, mesFim, 5);
    return d >= inicio && d <= fim;
  });
}

function render() {
  // Header
  const mesInicio = state.mesAtual;
  let mesFim = state.mesAtual + 1;
  let anoFim = state.anoAtual;
  if (mesFim > 11) { mesFim = 0; anoFim++; }
  document.getElementById('mes-label').textContent = '20 ' + MESES[mesInicio].substring(0,3) + ' - 05 ' + MESES[mesFim].substring(0,3) + ' ' + anoFim;

  const itens = lancamentosMes();
  const receitas = itens.filter(l => l.tipo === 'receita').reduce((s,l) => s + l.valor, 0);
  const gastos = itens.filter(l => l.tipo === 'gasto').reduce((s,l) => s + l.valor, 0);
  const saldo = receitas - gastos;

  document.getElementById('total-receita').textContent = fmt(receitas);
  document.getElementById('total-gasto').textContent = fmt(gastos);
  document.getElementById('total-saldo').textContent = fmt(saldo);
  document.getElementById('total-count').textContent = itens.length + ' lançamento' + (itens.length !== 1 ? 's' : '');

  // Barra orçamento
  const pct = state.orcamento > 0 ? Math.min((gastos / state.orcamento) * 100, 100) : 0;
  const fill = document.getElementById('orc-fill');
  fill.style.width = pct + '%';
  fill.className = 'bar-fill' + (pct >= 100 ? ' perigo' : pct >= 75 ? ' alerta' : '');
  document.getElementById('orc-label').textContent = fmt(gastos) + ' / ' + fmt(state.orcamento);

  // Lista lançamentos
  const lista = document.getElementById('lista-lancamentos');
  const ordenados = [...itens].sort((a,b) => new Date(b.data) - new Date(a.data));
  if (ordenados.length === 0) {
    lista.innerHTML = '<div class="vazio"><div class="emoji">💸</div>Nenhum lançamento neste mês.<br>Toque no + para adicionar.</div>';
  } else {
    lista.innerHTML = ordenados.map(l => {
      const cat = state.categorias.find(c => c.nome === l.categoria) || { emoji: '📦' };
      const corBg = l.tipo === 'receita' ? '#4ff79e20' : '#f75f4f20';
      const dataFmt = new Date(l.data + 'T00:00:00').toLocaleDateString('pt-BR');
      const pagoBadge = l.tipo === 'gasto'
        ? `<button onclick="togglePago('${l.id}')" class="badge-status ${l.pago ? 'pago' : 'pendente'}">${l.pago ? '✅ Pago' : '⏳ Pendente'}</button>`
        : '';
      return `
        <div class="lancamento-item" style="${l.pago ? 'opacity:0.75' : ''}">
          <div class="lanc-icone" style="background:${corBg}">${cat.emoji}</div>
          <div class="lanc-info">
            <div class="lanc-desc" style="${l.pago ? 'text-decoration:line-through' : ''}">${l.descricao}</div>
            <div class="lanc-meta">${l.categoria} • ${dataFmt}</div>
          </div>
          ${pagoBadge}
          <div class="lanc-valor ${l.tipo}">${l.tipo === 'receita' ? '+' : '-'}${fmt(l.valor)}</div>
          <button class="lanc-del" onclick="excluir('${l.id}')">✕</button>
        </div>`;
    }).join('');
  }

  // Relatório
  const relContent = document.getElementById('relatorio-content');
  const catGastos = {};
  itens.filter(l => l.tipo === 'gasto').forEach(l => {
    catGastos[l.categoria] = (catGastos[l.categoria] || 0) + l.valor;
  });
  const totalGasto = Object.values(catGastos).reduce((s,v) => s+v, 0);
  const sorted = Object.entries(catGastos).sort((a,b) => b[1]-a[1]);

  if (sorted.length === 0) {
    relContent.innerHTML = '<div class="vazio"><div class="emoji">📊</div>Sem gastos registrados neste mês.</div>';
  } else {
    relContent.innerHTML = `
      <div class="lista-title" style="margin-bottom:12px">Gastos por categoria</div>
      ${sorted.map(([nome, val]) => {
        const cat = state.categorias.find(c => c.nome === nome) || { emoji: '📦' };
        const pct = totalGasto > 0 ? ((val/totalGasto)*100).toFixed(1) : 0;
        return `
          <div class="cat-item">
            <div class="cat-header">
              <div class="cat-nome">${cat.emoji} ${nome}</div>
              <div>
                <span class="cat-valor">${fmt(val)}</span>
                <span class="cat-pct"> ${pct}%</span>
              </div>
            </div>
            <div class="cat-bar"><div class="cat-bar-fill" style="width:${pct}%"></div></div>
          </div>`;
      }).join('')}
    `;
  }

  // =============================================
  // Lista fixas COM badge A VENCER / PAGO
  // =============================================
  const listaFixas = document.getElementById('lista-fixas');
  if (state.contasFixas.length === 0) {
    listaFixas.innerHTML = '<div class="vazio" style="padding:16px;text-align:center;color:var(--muted);font-size:14px">Nenhuma conta fixa cadastrada.</div>';
  } else {
    listaFixas.innerHTML = state.contasFixas.map(f => {
      const cat = state.categorias.find(c => c.nome === f.categoria) || { emoji: '📦' };
      const lanc = getLancamentoFixaMes(f.id);
      let badgeHtml = '';
      if (lanc) {
        const statusClass = lanc.pago ? 'pago' : 'pendente';
        const statusTexto = lanc.pago ? '✅ Pago' : '⏳ A Vencer';
        badgeHtml = `<button onclick="togglePagoFixa('${lanc.id}')" class="badge-status ${statusClass}">${statusTexto}</button>`;
      } else {
        badgeHtml = `<span style="font-size:11px;color:var(--muted);flex-shrink:0">Fora do período</span>`;
      }
      // Info de parcelas
      let parcelaInfo = `Vence dia ${f.dia}`;
      if (f.parcelas && f.mesInicio) {
        const [anoInicio, mesInicio] = f.mesInicio.split('-').map(Number);
        const diffMeses = (state.anoAtual - anoInicio) * 12 + (state.mesAtual - (mesInicio - 1));
        const parcelaAtual = diffMeses + 1;
        parcelaInfo = `Vence dia ${f.dia} • ${parcelaAtual}/${f.parcelas}x`;
      }
      return `
        <div class="lancamento-item">
          <div class="lanc-icone" style="background:#f7c94f20">${cat.emoji}</div>
          <div class="lanc-info">
            <div class="lanc-desc">${f.descricao}</div>
            <div class="lanc-meta">${f.categoria} • ${parcelaInfo}</div>
          </div>
          ${badgeHtml}
          <div class="lanc-valor gasto">${fmt(f.valor)}</div>
          <button class="lanc-del" onclick="excluirContaFixa('${f.id}')">✕</button>
        </div>`;
    }).join('');
  }

  // Config: lista cats
  const listaCats = document.getElementById('lista-cats');
  listaCats.innerHTML = state.categorias.map((c, i) => `
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #ffffff08">
      <span style="font-size:18px">${c.emoji}</span>
      <span style="flex:1;font-size:14px">${c.nome}</span>
      ${i >= CATS_PADRAO.length ? `<button onclick="removerCategoria(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px">✕</button>` : ''}
    </div>
  `).join('');

  // Orçamento input
  document.getElementById('input-orcamento').value = state.orcamento || '';

  // Select categoria
  const sel = document.getElementById('form-cat');
  sel.innerHTML = state.categorias.map(c => `<option value="${c.nome}">${c.emoji} ${c.nome}</option>`).join('');
}

function mudarMes(delta) {
  state.mesAtual += delta;
  if (state.mesAtual > 11) { state.mesAtual = 0; state.anoAtual++; }
  if (state.mesAtual < 0) { state.mesAtual = 11; state.anoAtual--; }
  gerarContasFixasMes();
  render();
}

function trocarAba(aba, btn, fromNav = false) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('ativo'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
  document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('ativo'));
  document.getElementById('aba-' + aba).classList.add('ativo');
  if (btn) btn.classList.add('ativo');
  document.getElementById('nav-' + aba)?.classList.add('ativo');
  render();
}

function setTipo(tipo) {
  state.tipoForm = tipo;
  document.getElementById('btn-gasto').className = 'tipo-btn' + (tipo === 'gasto' ? ' ativo-gasto' : '');
  document.getElementById('btn-receita').className = 'tipo-btn' + (tipo === 'receita' ? ' ativo-receita' : '');
}

function abrirModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('form-desc').value = '';
  document.getElementById('form-valor').value = '';
  document.getElementById('form-data').value = new Date().toISOString().split('T')[0];
  setTipo('gasto');
  setTimeout(() => document.getElementById('form-desc').focus(), 100);
}

function fecharModalFora(e) {
  if (e.target.id === 'modal') fecharModal();
}

function fecharModal() {
  document.getElementById('modal').classList.remove('open');
}

function salvarLancamento() {
  const desc = document.getElementById('form-desc').value.trim();
  const valor = parseFloat(document.getElementById('form-valor').value);
  const cat = document.getElementById('form-cat').value;
  const data = document.getElementById('form-data').value;

  if (!desc) { toast('Digite a descrição'); return; }
  if (!valor || valor <= 0) { toast('Digite um valor válido'); return; }
  if (!data) { toast('Selecione a data'); return; }

  state.lancamentos.push({
    id: Date.now().toString(),
    descricao: desc,
    valor,
    tipo: state.tipoForm,
    categoria: cat,
    data,
    pago: false
  });

  salvar();
  fecharModal();
  render();
  toast(state.tipoForm === 'gasto' ? '💸 Gasto registrado!' : '💰 Receita registrada!');
}

function togglePago(id) {
  const lanc = state.lancamentos.find(l => l.id === id);
  if (lanc) { lanc.pago = !lanc.pago; }
  salvar();
  render();
  toast(lanc && lanc.pago ? '✅ Marcado como pago!' : '⏳ Marcado como pendente');
}

// Mesmo que togglePago mas chamado da aba de fixas
function togglePagoFixa(id) {
  togglePago(id);
}

function excluir(id) {
  if (!confirm('Excluir este lançamento?')) return;
  state.lancamentos = state.lancamentos.filter(l => l.id !== id);
  salvar();
  render();
  toast('Lançamento removido');
}

function salvarOrcamento() {
  const v = parseFloat(document.getElementById('input-orcamento').value);
  if (!v || v <= 0) { toast('Digite um valor válido'); return; }
  state.orcamento = v;
  salvar();
  render();
  toast('✅ Orçamento salvo!');
}

function adicionarCategoria() {
  const nome = document.getElementById('input-nova-cat').value.trim();
  const emoji = document.getElementById('input-cat-emoji').value.trim() || '📦';
  if (!nome) { toast('Digite o nome da categoria'); return; }
  if (state.categorias.find(c => c.nome.toLowerCase() === nome.toLowerCase())) {
    toast('Categoria já existe'); return;
  }
  state.categorias.push({ nome, emoji });
  document.getElementById('input-nova-cat').value = '';
  document.getElementById('input-cat-emoji').value = '';
  salvar();
  render();
  toast('✅ Categoria adicionada!');
}

function removerCategoria(i) {
  if (!confirm('Remover categoria?')) return;
  state.categorias.splice(i, 1);
  salvar();
  render();
}

function exportarCSV() {
  const itens = lancamentosMes();
  if (!itens.length) { toast('Sem lançamentos para exportar'); return; }
  const header = 'Data,Descrição,Tipo,Categoria,Valor,Status\n';
  const rows = itens.map(l => `${l.data},${l.descricao},${l.tipo},${l.categoria},${l.valor},${l.pago ? 'Pago' : 'Pendente'}`).join('\n');
  const blob = new Blob([header + rows], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url;
  a.download = `gastos_${MESES[state.mesAtual]}_${state.anoAtual}.csv`;
  a.click();
  toast('📥 CSV exportado!');
}

function limparDados() {
  if (!confirm('Isso vai apagar TODOS os lançamentos. Tem certeza?')) return;
  if (!confirm('Última confirmação: apagar tudo?')) return;
  state.lancamentos = [];
  state.mesesGerados = [];
  salvar();
  render();
  toast('Dados apagados');
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function toggleMesInicio() {
  const parcelas = document.getElementById('fixa-parcelas').value;
  const row = document.getElementById('row-mes-inicio');
  row.style.display = parcelas > 0 ? 'block' : 'none';
  if (parcelas > 0 && !document.getElementById('fixa-mes-inicio').value) {
    const hoje = new Date();
    document.getElementById('fixa-mes-inicio').value = hoje.getFullYear() + '-' + String(hoje.getMonth()+1).padStart(2,'0');
  }
}

function salvarContaFixa() {
  const desc = document.getElementById('fixa-desc').value.trim();
  const valor = parseFloat(document.getElementById('fixa-valor').value);
  const cat = document.getElementById('fixa-cat').value;
  const dia = parseInt(document.getElementById('fixa-dia').value);
  const parcelasInput = document.getElementById('fixa-parcelas').value;
  const parcelas = parcelasInput ? parseInt(parcelasInput) : null;
  const mesInicio = document.getElementById('fixa-mes-inicio').value;

  if (!desc) { toast('Digite a descrição'); return; }
  if (!valor || valor <= 0) { toast('Digite um valor válido'); return; }
  if (!dia || dia < 1 || dia > 31) { toast('Digite um dia válido'); return; }
  if (parcelas && !mesInicio) { toast('Informe o mês da 1ª parcela'); return; }

  const novaFixa = {
    id: Date.now().toString(),
    descricao: desc,
    valor,
    categoria: cat,
    dia,
    parcelas: parcelas || null,
    parcelaAtual: parcelas ? 1 : null,
    mesInicio: mesInicio || null
  };

  state.contasFixas.push(novaFixa);
  document.getElementById('fixa-desc').value = '';
  document.getElementById('fixa-valor').value = '';
  document.getElementById('fixa-dia').value = '';
  document.getElementById('fixa-parcelas').value = '';
  document.getElementById('fixa-mes-inicio').value = '';
  document.getElementById('row-mes-inicio').style.display = 'none';
  salvar();
  gerarContasFixasMes();
  render();
  toast('✅ Conta fixa adicionada!');
}

function excluirContaFixa(id) {
  if (!confirm('Remover conta fixa?')) return;
  state.contasFixas = state.contasFixas.filter(f => f.id !== id);
  // Remove também os lançamentos gerados por esta fixa
  state.lancamentos = state.lancamentos.filter(l => l.fixaId !== id);
  salvar();
  render();
  toast('Conta fixa removida');
}

function getParcela(fixa) {
  // Calcula qual parcela corresponde ao mes/ano atual
  if (!fixa.parcelas || !fixa.mesInicio) return null;
  const [anoInicio, mesInicio] = fixa.mesInicio.split('-').map(Number);
  const diffMeses = (state.anoAtual - anoInicio) * 12 + (state.mesAtual - (mesInicio - 1));
  if (diffMeses < 0 || diffMeses >= fixa.parcelas) return null;
  return diffMeses + 1; // parcela atual (1-based)
}

function gerarContasFixasMes() {
  const mesKey = state.anoAtual + '-' + state.mesAtual;
  if (!state.mesesGerados) state.mesesGerados = [];
  if (state.mesesGerados.includes(mesKey)) return;

  // Remove fixas que terminaram
  state.contasFixas = state.contasFixas.filter(fixa => {
    if (!fixa.parcelas || !fixa.mesInicio) return true;
    const [anoInicio, mesInicio] = fixa.mesInicio.split('-').map(Number);
    const totalMeses = fixa.parcelas;
    const anoFim = anoInicio + Math.floor((mesInicio - 1 + totalMeses) / 12);
    const mesFim = (mesInicio - 1 + totalMeses) % 12;
    if (state.anoAtual > anoFim || (state.anoAtual === anoFim && state.mesAtual >= mesFim)) {
      return false; // remove conta que terminou
    }
    return true;
  });

  state.contasFixas.forEach(fixa => {
    // Se tem parcelas, verifica se este mês está no período
    if (fixa.parcelas && fixa.mesInicio) {
      const parcela = getParcela(fixa);
      if (!parcela) return; // mês fora do período
    }

    const ano = fixa.dia >= 20 ? state.anoAtual : (state.mesAtual === 11 ? state.anoAtual + 1 : state.anoAtual);
    const mes = fixa.dia >= 20 ? state.mesAtual : (state.mesAtual === 11 ? 0 : state.mesAtual + 1);
    const dataStr = ano + '-' + String(mes+1).padStart(2,'0') + '-' + String(fixa.dia).padStart(2,'0');

    const jaExiste = state.lancamentos.some(l =>
      l.fixaId === fixa.id && l.data === dataStr
    );
    if (!jaExiste) {
      const parcela = fixa.parcelas ? getParcela(fixa) : null;
      const descricao = parcela ? fixa.descricao + ' (' + parcela + '/' + fixa.parcelas + 'x)' : fixa.descricao;
      state.lancamentos.push({
        id: Date.now().toString() + Math.random(),
        descricao,
        valor: fixa.valor,
        tipo: 'gasto',
        categoria: fixa.categoria,
        data: dataStr,
        pago: false,
        fixaId: fixa.id,
        parcela: parcela,
        totalParcelas: fixa.parcelas || null
      });
    }
  });

  state.mesesGerados.push(mesKey);
  salvar();
}

// Splash screen
setTimeout(() => {
  const splash = document.getElementById('splash');
  splash.classList.add('hide');
  setTimeout(() => splash.remove(), 800);
}, 2500);

carregar();
checarSenha();
gerarContasFixasMes();
render();
</script>
</body>
</html>
